<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤾 HB Sound Board</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap');

:root {
  --bg: #04061a;
  --s1: #070d2a;
  --s2: #0c1438;
  --s3: #101a45;
  --border: #1a2560;
  --red: #e63946;
  --orange: #00aaff;
  --blue: #3b82f6;
  --green: #2dc653;
  --spotify: #1DB954;
  --text: #d6e8ff;
  --muted: #4a6aaa;
  --wolf-accent: #1a6fff;
  --wolf-glow: rgba(26,111,255,.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 0 0 32px;
  background-image: url("width_800.webp");
  background-size: cover;
  background-position: center right;
  background-attachment: fixed;
  background-repeat: no-repeat;
  position: relative;
}

/* ══ MASTER BAR ══ */
.master-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(4,6,26,.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(26,111,255,.3);
  box-shadow: 0 1px 30px rgba(26,111,255,.08);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.master-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: .06em;
  white-space: nowrap;
  flex-shrink: 0;
}
.master-logo .r { color: var(--wolf-accent); }

/* now playing */
.master-now {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  background: rgba(12,20,56,.8);
  border: 1px solid rgba(26,111,255,.25);
  border-radius: 8px;
  padding: 7px 14px;
  backdrop-filter: blur(8px);
}
.live-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
  animation: blink 1.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
.master-np-text {
  flex: 1;
  min-width: 0;
  font-size: .82rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--muted);
}
.master-np-text .np-name { color: var(--text); }

/* progress in master bar */
.master-progress {
  flex: 1;
  max-width: 220px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.master-prog-bar {
  height: 3px;
  background: var(--border);
  border-radius: 3px;
  cursor: pointer;
  position: relative;
}
.master-prog-fill {
  height: 100%;
  background: var(--wolf-accent);
  border-radius: 3px;
  width: 0%;
  transition: width .4s linear;
  pointer-events: none;
}
.master-prog-times {
  display: flex;
  justify-content: space-between;
  font-size: .65rem;
  color: var(--muted);
}

/* master controls */
.master-ctrl {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.mc {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  padding: 7px 12px;
  cursor: pointer;
  font-size: .9rem;
  transition: all .15s;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.mc:hover { border-color: var(--orange); background: rgba(244,162,97,.08); }
.mc.pp {
  background: var(--wolf-accent);
  border-color: var(--wolf-accent);
  padding: 7px 18px;
  font-weight: 600;
  box-shadow: 0 0 16px rgba(26,111,255,.4);
}
.mc.pp:hover { background: #1560e0; border-color: #1560e0; }
.mc.stop { color: var(--muted); }
.mc.stop:hover { border-color: var(--red); color: var(--red); }
.mc.stop-all {
  background: rgba(230,57,70,.1);
  border-color: rgba(230,57,70,.4);
  color: #ff6b6b;
  font-size: .78rem;
  font-weight: 600;
  box-shadow: 0 0 10px rgba(230,57,70,.15);
}
.mc.stop-all:hover { background: rgba(230,57,70,.22); border-color: var(--red); }

/* volume */
.master-vol {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  font-size: .75rem;
  color: var(--muted);
}
.master-vol input { width: 90px; accent-color: var(--orange); cursor: pointer; }

/* ══ BENTO ══ */
.bento {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 12px;
  padding: 14px 16px 0;
  max-width: 1400px;
  margin: 0 auto;
}

/* ── CARD ── */
.card {
  background: rgba(7,13,42,.75);
  border: 1px solid rgba(26,111,255,.2);
  border-radius: 14px;
  overflow: hidden;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 24px rgba(0,0,0,.4), inset 0 1px 0 rgba(26,111,255,.08);
}
.card-hd {
  padding: 13px 16px 0;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
}
.card-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: .1em;
  color: var(--muted);
}

/* ── ENTRÉE JOUEURS ── */
.card-players {
  grid-column: 1 / -1;
  background: linear-gradient(120deg, rgba(4,6,26,.9) 0%, rgba(7,20,70,.85) 100%);
  border-color: rgba(26,111,255,.35);
}
.players-inner {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.btn-players {
  background: linear-gradient(135deg, #1a50cc, #1a6fff);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem;
  letter-spacing: .07em;
  padding: 16px 36px;
  cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: transform .1s, background .2s, box-shadow .2s;
  white-space: nowrap;
  box-shadow: 0 4px 24px rgba(26,111,255,.4);
}
.btn-players:hover { background: linear-gradient(135deg,#1544b0,#155fe0); transform: scale(1.02); box-shadow: 0 8px 32px rgba(26,111,255,.5); }
.btn-players:active { transform: scale(.97); }
.btn-players.playing {
  animation: pulse-blue 1.2s ease-in-out infinite;
  background: linear-gradient(135deg,#1544b0,#155fe0);
}
@keyframes pulse-blue {
  0%,100% { box-shadow: 0 0 0 0 rgba(26,111,255,.5); }
  50% { box-shadow: 0 0 0 18px rgba(26,111,255,0); }
}
@keyframes pulse-red {
  0%,100% { box-shadow: 0 0 0 0 rgba(230,57,70,.5); }
  50% { box-shadow: 0 0 0 16px rgba(230,57,70,0); }
}
.players-stop {
  background: none;
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--muted);
  padding: 11px 16px;
  cursor: pointer;
  font-size: 1.2rem;
  transition: all .15s;
}
.players-stop:hover { color: var(--red); border-color: var(--red); }
.players-meta h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: .05em;
  margin-bottom: 3px;
}
.players-meta p { font-size: .77rem; color: var(--muted); }

/* ── TEMPS MORT ── */
.card-tm { grid-column: 1; }
.tm-grid {
  padding: 10px 14px 10px;
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
}
.tm-btn {
  background: rgba(12,20,56,.6);
  border: 1px solid rgba(26,111,255,.15);
  border-radius: 10px;
  padding: 12px 10px;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
  transition: all .15s;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  position: relative; overflow: hidden;
  text-align: left;
}
.tm-btn::before {
  content: '';
  position: absolute; left:0; top:0; bottom:0; width:3px;
  background: var(--blue);
  transform: scaleY(0); transform-origin: bottom;
  transition: transform .2s;
}
.tm-btn:hover { background: rgba(16,26,69,.8); border-color: var(--wolf-accent); }
.tm-btn:hover::before { transform: scaleY(1); }
.tm-btn:active { transform: scale(.96); }
.tm-btn.playing-tm {
  background: rgba(72,149,239,.1);
  border-color: var(--blue);
  animation: glow-blue .8s ease-in-out infinite alternate;
}
.tm-btn.playing-tm::before { transform: scaleY(1); }
@keyframes glow-blue { from{box-shadow:0 0 0 0 rgba(72,149,239,.1)} to{box-shadow:0 0 10px rgba(72,149,239,.35)} }
.tm-emoji { font-size: 1.3rem; }
.tm-name { font-weight: 600; font-size: .8rem; line-height: 1.2; }
.tm-badge {
  font-size: .62rem; font-weight: 600;
  background: rgba(72,149,239,.15);
  color: var(--blue);
  padding: 1px 6px; border-radius: 4px;
}
.tm-stop-row { padding: 0 14px 12px; }
.btn-stop-tm {
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--muted);
  padding: 5px 13px;
  font-size: .75rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s;
}
.btn-stop-tm:hover { border-color: var(--red); color: var(--red); }

/* ── SPOTIFY ── */
.spotify-stack { grid-column: 2; grid-row: 2 / 5; display: flex; flex-direction: column; gap: 12px; }

.spotify-wrap { padding: 8px 14px 14px; }
.sp-embed iframe { border-radius: 8px; display: block; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* toast */
.toast {
  position: fixed; bottom: 18px; left: 50%;
  transform: translateX(-50%) translateY(50px);
  background: var(--s2); border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  padding: 8px 18px; border-radius: 8px;
  font-size: .8rem; z-index: 200;
  transition: transform .3s; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── PENALTY ── */
.card-penalty { grid-column: 1; }
.penalty-grid {
  padding: 10px 14px 14px;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 8px;
}
.penalty-btn {
  background: linear-gradient(135deg, #1a0a0e, #2a0d10);
  border: 1px solid rgba(230,57,70,.3);
  border-radius: 10px;
  padding: 14px 12px;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: flex-start; gap: 5px;
  transition: all .15s;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  position: relative; overflow: hidden;
  text-align: left;
}
.penalty-btn::before {
  content: '';
  position: absolute; left:0; top:0; bottom:0; width:3px;
  background: var(--red);
  transform: scaleY(0); transform-origin: bottom;
  transition: transform .2s;
}
.penalty-btn:hover { background: linear-gradient(135deg, #2a0d10, #3a1015); border-color: var(--red); }
.penalty-btn:hover::before { transform: scaleY(1); }
.penalty-btn:active { transform: scale(.96); }
.penalty-btn.playing-pen {
  background: rgba(230,57,70,.12);
  border-color: var(--red);
  animation: glow-red .8s ease-in-out infinite alternate;
}
.penalty-btn.playing-pen::before { transform: scaleY(1); }
@keyframes glow-red { from{box-shadow:0 0 0 0 rgba(230,57,70,.1)} to{box-shadow:0 0 12px rgba(230,57,70,.35)} }
.penalty-emoji { font-size: 1.4rem; }
.penalty-name { font-weight: 600; font-size: .82rem; line-height: 1.2; }
.penalty-badge {
  font-size: .62rem; font-weight: 600;
  background: rgba(230,57,70,.15);
  color: var(--red);
  padding: 1px 6px; border-radius: 4px;
}
.penalty-stop-row { padding: 0 14px 12px; }
.btn-stop-pen {
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--muted);
  padding: 5px 13px;
  font-size: .75rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s;
}
.btn-stop-pen:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>
<div style="position:fixed;inset:0;z-index:0;
  background: linear-gradient(135deg,
    rgba(4,6,26,.97) 0%,
    rgba(7,13,42,.92) 40%,
    rgba(4,6,26,.80) 100%);
  pointer-events:none"></div>

<!-- ══ MASTER BAR ══ -->
<div style="position:relative;z-index:1"><div class="master-bar">
  <div class="master-logo">🐺 HB <span class="r">Sound</span> Board</div>

  <div class="master-now">
    <div class="live-dot" id="liveDot" style="background:var(--muted);animation:none"></div>
    <div class="master-np-text">En cours : <span class="np-name" id="npName">—</span></div>
  </div>

  <div class="master-progress">
    <div class="master-prog-bar" id="masterProgBar">
      <div class="master-prog-fill" id="masterProgFill"></div>
    </div>
    <div class="master-prog-times">
      <span id="masterCur">0:00</span>
      <span id="masterDur">0:00</span>
    </div>
  </div>

  <div class="master-ctrl">
    <button class="mc pp" id="masterPP" onclick="toggleMasterPlay()">▶ Play</button>
    <button class="mc stop" onclick="stopCurrent()" title="Arrêter">⏹</button>
    <button class="mc stop-all" onclick="stopEverything()">⏹ Tout couper</button>
  </div>

  <div class="master-vol">
    🔊
    <input type="range" id="volSlider" min="0" max="1" step=".01" value=".8" oninput="setVol(this.value)" />
    <span id="volPct">80%</span>
  </div>
</div>

<!-- ══ BENTO ══ -->
<div class="bento">

  <!-- ENTRÉE JOUEURS -->
  <div class="card card-players" style="grid-column:1/-1">
    <div class="players-inner">
      <button class="btn-players" id="btnPlayers" onclick="toggleSpaceJam()">
        🏟 ENTRÉE DES JOUEURS
      </button>
      <button class="players-stop" onclick="stopEverything()" title="Stop">⏹</button>
      <div class="players-meta">
        <h3>Space Jam – Let's Get Ready To Rumble</h3>
        <p>Lance l'entrée des joueurs sur le terrain</p>
      </div>
    </div>
  </div>

  <!-- TEMPS MORT -->
  <div class="card card-tm">
    <div class="card-hd">
      <div class="card-label" style="color:var(--blue)">⏱ Temps mort</div>
    </div>
    <div class="tm-grid">
      <button class="tm-btn" onclick="playTM('Avicii – Levels', this)">
        <span class="tm-emoji">🎧</span>
        <span class="tm-name">Levels</span>
        <span class="tm-badge">▶ 0s</span>
      </button>
      <button class="tm-btn" onclick="playTM('GALA – Freed from Desire', this)">
        <span class="tm-emoji">🔥</span>
        <span class="tm-name">Freed from Desire</span>
        <span class="tm-badge">▶ 0s</span>
      </button>
      <button class="tm-btn" onclick="playTM('Jennifer Lopez – Lets Get Loud', this)">
        <span class="tm-emoji">💥</span>
        <span class="tm-name">Let's Get Loud</span>
        <span class="tm-badge">▶ 0s</span>
      </button>
      <button class="tm-btn" onclick="playTM('Europe – The Final Countdown', this)">
        <span class="tm-emoji">⏱</span>
        <span class="tm-name">Final Countdown</span>
        <span class="tm-badge">▶ 14s</span>
      </button>
      <button class="tm-btn" onclick="playTM('Darude – Sandstorm', this)">
        <span class="tm-emoji">🌪</span>
        <span class="tm-name">Sandstorm</span>
        <span class="tm-badge">▶ 20s</span>
      </button>
      <button class="tm-btn" onclick="playTM('Gloria Gaynor – I Will Survive', this)">
        <span class="tm-emoji">💪</span>
        <span class="tm-name">I Will Survive</span>
        <span class="tm-badge">▶ 9s</span>
      </button>
    </div>
    <div class="tm-stop-row">
      <button class="btn-stop-tm" onclick="stopEverything()">⏹ Stop tous les temps mort</button>
    </div>
  </div>

  <!-- PENALTY -->
  <div class="card card-penalty">
    <div class="card-hd">
      <div class="card-label" style="color:var(--red)">🎯 Pénalty</div>
    </div>
    <div class="penalty-grid">
      <button class="penalty-btn" onclick="playPenalty('Le Bon la Brute et le Truand', this)">
        <span class="penalty-emoji">🤠</span>
        <span class="penalty-name">Le Bon la Brute et le Truand</span>
        <span class="penalty-badge">▶ Ennio Morricone</span>
      </button>
      <button class="penalty-btn" onclick="playPenalty('Eye of the Tiger', this)">
        <span class="penalty-emoji">🐯</span>
        <span class="penalty-name">Eye of the Tiger</span>
        <span class="penalty-badge">▶ Survivor</span>
      </button>
      <button class="penalty-btn" onclick="playPenalty('Les Dents de la Mer', this)">
        <span class="penalty-emoji">🦈</span>
        <span class="penalty-name">Les Dents de la Mer</span>
        <span class="penalty-badge">▶ 14s – Film</span>
      </button>
    </div>
    <div class="penalty-stop-row">
      <button class="btn-stop-pen" onclick="stopEverything()">⏹ Stop pénalty</button>
    </div>
  </div>

  <!-- SPOTIFY STACK (right column, rows 2-4) -->
  <div class="spotify-stack">
    <div class="card">
      <div class="card-hd">
        <div class="card-label" style="color:var(--spotify)">🎵 Échauffement</div>
      </div>
      <div class="spotify-wrap">
        <div class="sp-embed" id="spEmbed_warm"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd">
        <div class="card-label" style="color:var(--spotify)">🎵 Mi-temps</div>
      </div>
      <div class="spotify-wrap">
        <div class="sp-embed" id="spEmbed_half"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd">
        <div class="card-label" style="color:var(--spotify)">🏆 Après match</div>
      </div>
      <div class="spotify-wrap">
        <div class="sp-embed" id="spEmbed_after"></div>
      </div>
    </div>
  </div>

</div><!-- /bento -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  AUDIO DATA
// ══════════════════════════════════════════════
const TM_AUDIO = {
  "Avicii – Levels":                { src: "sounds/TEMPS MORT - 0s Avicii - Levels.mp3",                                    start: 0  },
  "GALA – Freed from Desire":       { src: "sounds/TEMPS MORT - 0s GALA - Freed from desire [Official Video].mp3",           start: 0  },
  "Jennifer Lopez – Lets Get Loud": { src: "sounds/TEMPS MORT - 0s Jennifer Lopez - Lets Get Loud.mp3",                      start: 0  },
  "Europe – The Final Countdown":   { src: "sounds/TEMPS MORT - 14s Europe - The Final Countdown (Official Video).mp3",       start: 14 },
  "Darude – Sandstorm":             { src: "sounds/TEMPS MORT - 20s Darude - Sandstorm.mp3",                                 start: 20 },
  "Gloria Gaynor – I Will Survive": { src: "sounds/TEMPS MORT - 9s Gloria Gaynor - I Will Survive.mp3",                      start: 9  },
};

const PENALTY_AUDIO = {
  "Le Bon la Brute et le Truand": { src: "sounds/PENALTY  - Le bon la brute et le truand musique.mp3", start: 5  },
  "Eye of the Tiger":             { src: "sounds/PENALTY  - Survivor Eye Of The Tiger Official HD Video.mp3", start: 0 },
  "Les Dents de la Mer":          { src: "sounds/PENALTY  - 14s [Film] Musique - Les Dents De La Mer.mp3",   start: 14 },
};

const SPACE_JAM_SRC = "sounds/_Joueur start - Space jam- Lets get ready to rumble.mp3";

// ══════════════════════════════════════════════
//  SINGLE ACTIVE AUDIO STATE
//  On ne garde qu'UN seul objet Audio actif à la fois.
// ══════════════════════════════════════════════
let activeAudio  = null;   // l'Audio en cours
let activeBtn    = null;   // le bouton allumé (pour l'éteindre)
let activeName   = '—';    // label affiché dans la master bar
let progressTimer = null;  // setInterval pour la barre de progression

// ── Nettoyer complètement l'audio actif ──────
function clearActive() {
  clearInterval(progressTimer);
  progressTimer = null;

  if (activeAudio) {
    activeAudio.pause();
    activeAudio.currentTime = 0;
    activeAudio.onended = null;
    activeAudio = null;
  }

  if (activeBtn) {
    activeBtn.classList.remove('playing', 'playing-tm', 'playing-pen');
    activeBtn = null;
  }

  activeName = '—';
  setNP('—');
  setLiveDot(false);
  updateMasterUI(false);
  resetProgressBar();
}

// ── Lancer un Audio avec gestion commune ─────
function startAudio(audioObj, displayName, btn, startSec) {
  clearActive(); // stoppe tout ce qui tournait avant

  activeAudio = audioObj;
  activeBtn   = btn;
  activeName  = displayName;

  audioObj.volume = vol();

  const doPlay = () => {
    if (startSec > 0) audioObj.currentTime = startSec;
    audioObj.play();
    setNP(displayName);
    setLiveDot(true);
    updateMasterUI(true);
    startProgressTracking(audioObj);
  };

  if (audioObj.readyState >= 1) { // HAVE_METADATA
    doPlay();
  } else {
    audioObj.addEventListener('loadedmetadata', doPlay, { once: true });
    audioObj.load();
  }

  audioObj.onended = () => { clearActive(); };
}

// ── Suivi de progression ──────────────────────
function startProgressTracking(a) {
  clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    if (!a || !a.duration) return;
    const pct = a.currentTime / a.duration;
    document.getElementById('masterProgFill').style.width = (pct * 100) + '%';
    document.getElementById('masterCur').textContent = fmt(a.currentTime);
    document.getElementById('masterDur').textContent = fmt(a.duration);
  }, 300);
}

function resetProgressBar() {
  document.getElementById('masterProgFill').style.width = '0%';
  document.getElementById('masterCur').textContent = '0:00';
  document.getElementById('masterDur').textContent = '0:00';
}

// ══════════════════════════════════════════════
//  SPACE JAM – Entrée des joueurs
// ══════════════════════════════════════════════
function toggleSpaceJam() {
  const btn = document.getElementById('btnPlayers');

  // Si déjà en lecture → pause/reprise
  if (activeAudio && activeBtn === btn) {
    if (!activeAudio.paused) {
      activeAudio.pause();
      setLiveDot(false);
      updateMasterUI(false);
    } else {
      activeAudio.play();
      setLiveDot(true);
      updateMasterUI(true);
    }
    return;
  }

  const a = new Audio(SPACE_JAM_SRC);
  btn.classList.add('playing');
  startAudio(a, '🏟 Entrée des joueurs', btn, 0);
}

// ══════════════════════════════════════════════
//  TEMPS MORT
// ══════════════════════════════════════════════
function playTM(key, btn) {
  // Clic sur le bouton actif → toggle pause/reprise
  if (activeBtn === btn && activeAudio) {
    if (!activeAudio.paused) {
      activeAudio.pause();
      setLiveDot(false);
      updateMasterUI(false);
    } else {
      activeAudio.play();
      setLiveDot(true);
      updateMasterUI(true);
    }
    return;
  }

  const track = TM_AUDIO[key];
  const a = new Audio(track.src);
  btn.classList.add('playing-tm');
  const label = '⏱ ' + key.split(' – ').pop();
  startAudio(a, label, btn, track.start);
}

// ══════════════════════════════════════════════
//  PENALTY
// ══════════════════════════════════════════════
function playPenalty(key, btn) {
  if (activeBtn === btn && activeAudio) {
    if (!activeAudio.paused) {
      activeAudio.pause();
      setLiveDot(false);
      updateMasterUI(false);
    } else {
      activeAudio.play();
      setLiveDot(true);
      updateMasterUI(true);
    }
    return;
  }

  const track = PENALTY_AUDIO[key];
  const a = new Audio(track.src);
  btn.classList.add('playing-pen');
  startAudio(a, '🎯 ' + key, btn, track.start);
}

// ══════════════════════════════════════════════
//  MASTER BAR CONTROLS
// ══════════════════════════════════════════════
function toggleMasterPlay() {
  if (!activeAudio) return;
  if (activeAudio.paused) {
    activeAudio.play();
    setLiveDot(true);
    updateMasterUI(true);
  } else {
    activeAudio.pause();
    setLiveDot(false);
    updateMasterUI(false);
  }
}

// Arrête uniquement l'audio actif (bouton ⏹ simple)
function stopCurrent() {
  if (activeAudio) clearActive();
}

// Arrête absolument tout
function stopEverything() {
  clearActive();
  // Sécurité : retire toutes les classes playing si jamais un état parasite subsistait
  document.querySelectorAll('.playing,.playing-tm,.playing-pen').forEach(el => {
    el.classList.remove('playing', 'playing-tm', 'playing-pen');
  });
  toast('⏹ Tout arrêté');
}

// ══════════════════════════════════════════════
//  VOLUME
// ══════════════════════════════════════════════
function vol() { return parseFloat(document.getElementById('volSlider').value); }
function setVol(v) {
  if (activeAudio) activeAudio.volume = parseFloat(v);
  document.getElementById('volPct').textContent = Math.round(v * 100) + '%';
}

// ══════════════════════════════════════════════
//  SPOTIFY
// ══════════════════════════════════════════════
const SPOTIFY_URLS = {
  warm:  "https://open.spotify.com/playlist/5kgtmduXRvIeKpYQDhAThs",
  half:  "https://open.spotify.com/playlist/0eMH71h934yG2dOIkgDL0D",
  after: "https://open.spotify.com/playlist/4UTmo2A38NeOgnarCP5Mzh"
};
function loadSpotify(id) {
  const url = SPOTIFY_URLS[id];
  if (!url) return;
  const match = url.match(/spotify\.com\/(track|playlist|album|artist)\/([a-zA-Z0-9]+)/);
  const embedUrl = match
    ? `https://open.spotify.com/embed/${match[1]}/${match[2]}?utm_source=generator&theme=0`
    : url;
  document.getElementById('spEmbed_' + id).innerHTML =
    `<iframe src="${embedUrl}" width="100%" height="152" frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy" style="border-radius:8px"></iframe>`;
}

// ══════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}
function setNP(txt) { document.getElementById('npName').textContent = txt; }
function setLiveDot(on) {
  const d = document.getElementById('liveDot');
  d.style.background = on ? 'var(--wolf-accent)' : 'var(--muted)';
  d.style.animation  = on ? 'blink 1.4s infinite' : 'none';
}
function updateMasterUI(playing) {
  document.getElementById('masterPP').textContent = playing ? '⏸ Pause' : '▶ Play';
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
window.addEventListener('load', () => {
  loadSpotify('warm');
  loadSpotify('half');
  loadSpotify('after');
});
</script>
